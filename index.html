let _db = null;
let _cloudReady = false;
let _shopId = null;     // ชื่อผู้ใช้ของร้านที่ล็อกอินอยู่
let _shopCache = null;  // ข้อมูลร้านทั้งก้อน (เมื่อใช้คลาวด์)
const _mem = {};
const SESSION_KEY = "durian_session"; // จำการล็อกอินในเครื่องนี้
const acctKey = (u) => "durian_acct_" + u;
const lkey = (key) => "durian:" + (_shopId || "_") + ":" + key;

function initCloud() {
  try {
    if (FIREBASE_CONFIG && FIREBASE_CONFIG.projectId && typeof window !== "undefined" && window.firebase) {
      if (!window.firebase.apps.length) window.firebase.initializeApp(FIREBASE_CONFIG);
      _db = window.firebase.firestore();
      _cloudReady = true;
    }
  } catch (e) {
    _cloudReady = false;
  }
}

/* ---- ที่เก็บแบบไม่ผูกร้าน (ใช้กับบัญชี/เซสชันในเครื่อง) ---- */
async function rawGet(rk) {
  if (typeof window !== "undefined" && window.storage) {
    try { const r = await window.storage.get(rk, false); if (r) return JSON.parse(r.value); } catch {}
  }
  try { const v = localStorage.getItem(rk); if (v != null) return JSON.parse(v); } catch {}
  return rk in _mem ? _mem[rk] : null;
}
async function rawSet(rk, val) {
  if (typeof window !== "undefined" && window.storage) {
    try { await window.storage.set(rk, JSON.stringify(val), false); _mem[rk] = val; return; } catch {}
  }
  try { localStorage.setItem(rk, JSON.stringify(val)); return; } catch {}
  _mem[rk] = val;
}

/* ---- ที่เก็บข้อมูลของร้าน (ผูกกับร้านที่ล็อกอิน) ---- */
async function dbGet(key) {

    try {
      if (!_shopCache) {
        const snap = await _db.collection("shops").doc(_shopId).get();
        _shopCache = snap.exists ? (snap.data() || {}) : {};
      }
      return key in _shopCache ? _shopCache[key] : null;
    } catch {}
  }
  const k = lkey(key);
  if (typeof window !== "undefined" && window.storage) {
    try { const r = await window.storage.get(k, false); if (r) return JSON.parse(r.value); } catch {}
  }
  try { const v = localStorage.getItem(k); if (v != null) return JSON.parse(v); } catch {}
  return k in _mem ? _mem[k] : null;
}
async function dbSet(key, val) {
  if (_cloudReady && _shopId) {
    try {
      if (!_shopCache) _shopCache = {};
      _shopCache[key] = val;
      await _db.collection("shops").doc(_shopId).set({ [key]: val }, { merge: true });
      return;
    } catch {}
  }
  const k = lkey(key);
  if (typeof window !== "undefined" && window.storage) {
    try { await window.storage.set(k, JSON.stringify(val), false); _mem[k] = val; return; } catch {}
  }
  try { localStorage.setItem(k, JSON.stringify(val)); return; } catch {}
  _mem[k] = val;
}

/* ---- เข้าสู่ระบบ / สมัครร้าน / เปลี่ยนรหัส ---- */
async function cloudGetShop(u) {
  const s = await _db.collection("shops").doc(u).get();
  return s.exists ? (s.data() || {}) : null;
}
async function loginShop(username, password) {
  const u = (username || "").trim();
  if (!u || !password) return { ok: false, error: "กรอกชื่อผู้ใช้และรหัสผ่านให้ครบ" };
  if (_cloudReady) {
    try {
      const data = await cloudGetShop(u);
      if (!data) return { ok: false, error: "ไม่พบบัญชีนี้ — ถ้าเป็นร้านใหม่ให้กด ‘สมัครร้านใหม่’" };
      if (data.password !== password) return { ok: false, error: "รหัสผ่านไม่ถูกต้อง" };
      _shopId = u; _shopCache = data;
      const name = (data[KEY_SETTINGS] && data[KEY_SETTINGS].shopName) || data.shopName || u;
      return { ok: true, shopName: name };
    } catch (e) { return { ok: false, error: "เชื่อมต่อฐานข้อมูลไม่ได้ ลองใหม่อีกครั้ง" }; }
  } else {
    const acct = await rawGet(acctKey(u));
    if (!acct) return { ok: false, error: "ไม่พบบัญชีนี้ในเครื่องนี้ — ถ้าเป็นร้านใหม่ให้กด ‘สมัครร้านใหม่’" };
    if (acct.password !== password) return { ok: false, error: "รหัสผ่านไม่ถูกต้อง" };
    _shopId = u; _shopCache = null;
    return { ok: true, shopName: acct.shopName || u };
  }
}
async function registerShop(username, password, shopName) {
  const u = (username || "").trim();
  if (!u || !password) return { ok: false, error: "กรอกชื่อผู้ใช้และรหัสผ่านให้ครบ" };
  const name = (shopName || "").trim() || u;
  if (_cloudReady) {
    try {
      const existing = await cloudGetShop(u);
      if (existing) return { ok: false, error: "มีบัญชีนี้แล้ว ลองเข้าสู่ระบบแทน" };
      const doc = {
        password,
        shopName: name,
        [KEY_PRODUCTS]: DEFAULT_PRODUCTS,
        [KEY_SALES]: [],
        [KEY_SETTINGS]: { ...DEFAULT_SETTINGS, shopName: name },
      };
      await _db.collection("shops").doc(u).set(doc);
      _shopId = u; _shopCache = doc;
      return { ok: true, shopName: name };
    } catch (e) { return { ok: false, error: "เชื่อมต่อฐานข้อมูลไม่ได้ ลองใหม่อีกครั้ง" }; }
  } else {
    const existing = await rawGet(acctKey(u));
    if (existing) return { ok: false, error: "มีบัญชีนี้แล้วในเครื่องนี้ ลองเข้าสู่ระบบแทน" };
    await rawSet(acctKey(u), { password, shopName: name });
    _shopId = u; _shopCache = null;
    await dbSet(KEY_PRODUCTS, DEFAULT_PRODUCTS);
    await dbSet(KEY_SALES, []);
    await dbSet(KEY_SETTINGS, { ...DEFAULT_SETTINGS, shopName: name });
    return { ok: true, shopName: name };
  }
}
async function changeShopPassword(newPass) {
  if (!_shopId || !newPass) return;
  if (_cloudReady) {
    try { await _db.collection("shops").doc(_shopId).set({ password: newPass }, { merge: true }); if (_shopCache) _shopCache.password = newPass; } catch {}
  } else {
    const acct = (await rawGet(acctKey(_shopId))) || {};
    acct.password = newPass;
    await rawSet(acctKey(_shopId), acct);
  }
}

const sameDay = (iso, d = new Date()) =>
  new Date(iso).toDateString() === d.toDateString();

/* ===================== ระบบเข้าสู่ระบบ (ชื่อผู้ใช้ + รหัสผ่าน) ===================== */
function App() {
  const [booting, setBooting] = useState(true);
  const [authed, setAuthed] = useState(false);
  const [shop, setShop] = useState(null);

  useEffect(() => {
    (async () => {
      initCloud();
      try {
        const sess = await rawGet(SESSION_KEY);
        if (sess && sess.shopId) {
          _shopId = sess.shopId;
          _shopCache = null;
          setShop({ id: sess.shopId, shopName: sess.shopName || sess.shopId });
          setAuthed(true);
        }
      } catch {}
      setBooting(false);
    })();
  }, []);

  const finish = async (res) => {
    if (!res || !res.ok) return res;
    await rawSet(SESSION_KEY, { shopId: _shopId, shopName: res.shopName });
    setShop({ id: _shopId, shopName: res.shopName });
    setAuthed(true);
    return res;
  };

  const onLogin = async (u, p) => finish(await loginShop(u, p));
  const onRegister = async (u, p, name) => finish(await registerShop(u, p, name));
  const onLogout = async () => {
    await rawSet(SESSION_KEY, null);
    _shopId = null; _shopCache = null;
    setAuthed(false); setShop(null);
  };
  const onChangePin = async (newPass) => { await changeShopPassword(newPass); };

  if (booting) {
    return (
      <div className="app">
        <style>{CSS}</style>
        <div className="wrap" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
          <div className="loading"><img className="boot-logo" src={LOGO_MARK} alt="" /><div>กำลังเปิดร้าน…</div></div>
        </div>
      </div>
    );
  }
  if (!authed) return <AuthScreen onLogin={onLogin} onRegister={onRegister} cloud={_cloudReady} />;
  return <MainApp account={{ shopName: shop.shopName }} onLogout={onLogout} onChangePin={onChangePin} />;
}

        <div className="cloud-status">

        <div className="auth-tabs">
          <button className={"auth-tab" + (mode === "login" ? " active" : "")} onClick={() => { setMode("login"); setError(""); }}>เข้าสู่ระบบ</button>
          <button className={"auth-tab" + (mode === "register" ? " active" : "")} onClick={() => { setMode("register"); setError(""); }}>สมัครร้านใหม่</button>
        </div>

        <div className="auth-form">
          <label className="field">
            <span>ชื่อผู้ใช้ (รหัสร้าน)</span>
            <input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="เช่น Admin000" autoCapitalize="none" autoCorrect="off" />

              <span>ชื่อร้าน</span>
              <input value={shopName} onChange={(e) => setShopName(e.target.value)} placeholder="เช่น หมอนทองป้าแก้ว" />
            </label>
          )}
          <label className="field">
            <span>รหัสผ่าน</span>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="รหัสผ่าน" />
          </label>
          {error && <div className="auth-error">{error}</div>}
          <button className="btn btn-primary full" disabled={busy} onClick={submit}>
            {busy ? "กำลังดำเนินการ…" : (mode === "login" ? "เข้าสู่ระบบ" : "สมัครและเริ่มใช้งาน")}
          </button>

  );
}

/* ===================== แอปหลัก ===================== */
function MainApp({ account, onLogout, onChangePin }) {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("sell");

  const [products, setProducts] = useState(DEFAULT_PRODUCTS);
  const [sales, setSales] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);

  // โหลดข้อมูลครั้งแรก
  useEffect(() => {
    (async () => {
      const p = await dbGet(KEY_PRODUCTS);
      const s = await dbGet(KEY_SALES);
      const st = await dbGet(KEY_SETTINGS);
      if (p && p.length) setProducts(p);
      else dbSet(KEY_PRODUCTS, DEFAULT_PRODUCTS);
      if (s) setSales(s);
      if (st) setSettings({ ...DEFAULT_SETTINGS, ...st });
      setLoaded(true);
    })();
  }, []);

  // บันทึกอัตโนมัติเมื่อมีการเปลี่ยนแปลง
  useEffect(() => { if (loaded) dbSet(KEY_PRODUCTS, products); }, [products, loaded]);
  useEffect(() => { if (loaded) dbSet(KEY_SALES, sales); }, [sales, loaded]);
  useEffect(() => { if (loaded) dbSet(KEY_SETTINGS, settings); }, [settings, loaded]);

  const todayTotal = useMemo(
    () => sales.filter((s) => sameDay(s.ts)).reduce((a, s) => a + s.amount, 0),
    [sales]
  );

  // ---- การขาย ----
  const recordSale = (selected, kgNum, pieces, payment, discount = { type: "percent", value: 0 }) => {
    const subtotal = Math.round(kgNum * selected.pricePerKg);
    let discountAmount = 0;
    if (discount.type === "percent") discountAmount = Math.round((subtotal * (Number(discount.value) || 0)) / 100);
    else discountAmount = Math.min(Math.round(Number(discount.value) || 0), subtotal);
    discountAmount = Math.max(0, discountAmount);
    const amount = Math.max(0, subtotal - discountAmount);
    const sale = {
      id: uid(),
      ts: new Date().toISOString(),
      productId: selected.id,
      productName: selected.name,
      kg: kgNum,
      pieces,
      subtotal,
      discountType: discount.type,
      discountValue: Number(discount.value) || 0,
      discount: discountAmount,
      amount,
      payment,
    };
    setSales((prev) => [sale, ...prev]);
    setProducts((prev) =>
      prev.map((p) =>
        p.id === selected.id ? { ...p, stock: Math.max(0, p.stock - pieces) } : p
      )
    );
    return sale;
  };

  const deleteSale = (id) => {
    const sale = sales.find((s) => s.id === id);
    if (!sale) return;
    setSales((prev) => prev.filter((s) => s.id !== id));
    setProducts((prev) =>
      prev.map((p) =>
        p.id === sale.productId
          ? { ...p, stock: p.stock + (sale.pieces || 0), initialStock: Math.max(p.initialStock, p.stock + (sale.pieces || 0)) }
          : p
      )
    );
  };

  const editSale = (id, kgNum, piecesNum) => {
    const sale = sales.find((s) => s.id === id);
    if (!sale) return;
    const prod = products.find((p) => p.id === sale.productId);
    const unit = prod ? prod.pricePerKg : (sale.kg ? Math.round((sale.subtotal || sale.amount) / sale.kg) : 0);
    const subtotal = Math.round(kgNum * unit);
    let disc = 0;
    if (sale.discountType === "percent") disc = Math.round((subtotal * (sale.discountValue || 0)) / 100);
    else if (sale.discountType === "baht") disc = Math.min(sale.discountValue || 0, subtotal);
    disc = Math.max(0, disc);
    const newAmount = Math.max(0, subtotal - disc);
    const deltaPieces = piecesNum - (sale.pieces || 0); // ขายเพิ่ม = ตัดสต็อกเพิ่ม, ขายน้อยลง = คืนสต็อก
    setSales((prev) =>
      prev.map((s) => (s.id === id ? { ...s, kg: kgNum, pieces: piecesNum, subtotal, discount: disc, amount: newAmount } : s))
    );
    if (prod && deltaPieces !== 0) {
      setProducts((prev) =>
        prev.map((p) => {
          if (p.id !== sale.productId) return p;
          const stock = Math.max(0, p.stock - deltaPieces);
          return { ...p, stock, initialStock: Math.max(p.initialStock, stock) };
        })
      );
    }
  };

  if (!loaded) {
    return (
      <div className="app">
        <style>{CSS}</style>
        <div className="wrap" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
          <div className="loading"><img className="boot-logo" src={LOGO_MARK} alt="" /><div>กำลังเปิดร้าน…</div></div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <style>{CSS}</style>
      <div className="wrap">
        <header className="header">
          <div className="brand">
            <img className="logo-mark" src={LOGO_MARK} alt="" />
            <span className="brand-name">{settings.shopName}</span>
          </div>
          <div className="today-pill" onClick={() => setTab("dashboard")}>
            <span className="today-pill-label">วันนี้</span>
            <span className="today-pill-val">฿{fmt(todayTotal)}</span>
          </div>
        </header>

        <main className="screen">
          {tab === "sell" && (
            <SellScreen products={products} onSell={recordSale} goStock={() => setTab("stock")} />
          )}
          {tab === "dashboard" && (
            <Dashboard sales={sales} products={products} onDelete={deleteSale} onEdit={editSale} />
          )}
          {tab === "stock" && (
            <StockScreen products={products} setProducts={setProducts} />
          )}
          {tab === "settings" && (
            <SettingsScreen settings={settings} setSettings={setSettings} sales={sales} products={products} account={account} onLogout={onLogout} onChangePin={onChangePin} />
          )}
        </main>

        <nav className="nav">
          <NavBtn icon={<Icon name="shopping-bag" />} label="ขาย" active={tab === "sell"} onClick={() => setTab("sell")} />
          <NavBtn icon={<Icon name="bar-chart" />} label="สรุป" active={tab === "dashboard"} onClick={() => setTab("dashboard")} />
          <NavBtn icon={<Icon name="boxes" />} label="สต็อก" active={tab === "stock"} onClick={() => setTab("stock")} />
          <NavBtn icon={<Icon name="settings" />} label="ตั้งค่า" active={tab === "settings"} onClick={() => setTab("settings")} />
        </nav>
      </div>
    </div>
  );
}

function NavBtn({ icon, label, active, onClick }) {
  return (
    <button className={"nav-btn" + (active ? " active" : "")} onClick={onClick}>
      <span className="nav-icon">{icon}</span>
      <span className="nav-label">{label}</span>
    </button>
  );
}

/* ===================== หน้าขาย ===================== */
function SellScreen({ products, onSell, goStock }) {
  const [selected, setSelected] = useState(null);
  const [weight, setWeight] = useState("");
  const [pieces, setPieces] = useState(1);
  const [success, setSuccess] = useState(null);
  const [discMode, setDiscMode] = useState("percent"); // "percent" | "baht"
  const [discPct, setDiscPct] = useState(0);
  const [discBaht, setDiscBaht] = useState("");

  const kgNum = parseFloat(weight) || 0;
  const subtotal = selected ? Math.round(kgNum * selected.pricePerKg) : 0;
  const discountAmount = discMode === "percent"
    ? Math.round((subtotal * (Number(discPct) || 0)) / 100)
    : Math.min(Math.round(Number(discBaht) || 0), subtotal);
  const total = Math.max(0, subtotal - Math.max(0, discountAmount));

  const clearDiscount = () => { setDiscMode("percent"); setDiscPct(0); setDiscBaht(""); };
  const reset = () => { setSelected(null); setWeight(""); setPieces(1); clearDiscount(); };

  const tapKey = (k) => {
    setWeight((w) => {
      if (k === "del") return w.slice(0, -1);
      if (k === ".") return w.includes(".") ? w : (w === "" ? "0." : w + ".");
      if (w.replace(".", "").length >= 6) return w;
      // จำกัดทศนิยม 2 ตำแหน่ง
      if (w.includes(".") && w.split(".")[1].length >= 2) return w;
      return w + k;
    });
  };

  const doSell = (payment) => {
    if (!selected || kgNum <= 0) return;
    const discount = discMode === "percent"
      ? { type: "percent", value: Number(discPct) || 0 }
      : { type: "baht", value: Number(discBaht) || 0 };
    const sale = onSell(selected, kgNum, pieces, payment, discount);
    setSuccess({ amount: sale.amount, payment });
    setTimeout(() => { setSuccess(null); reset(); }, 1600);
  };

  if (products.length === 0) {
    return (
      <div className="empty">
        <p className="empty-title">ยังไม่มีพันธุ์ทุเรียน</p>
        <p className="empty-sub">เพิ่มพันธุ์และตั้งราคาก่อนเริ่มขาย</p>
        <button className="btn btn-primary" onClick={goStock}>ไปหน้าสต็อก</button>
      </div>
    );
  }

  // ขั้นที่ 1: เลือกพันธุ์
  if (!selected) {
    return (
      <div>
        <h2 className="screen-title">เลือกพันธุ์ทุเรียน</h2>
        <div className="grid">
          {products.map((p) => (
            <button
              key={p.id}
              className={"pcard" + (p.stock <= LOW_STOCK ? " low" : "")}
              onClick={() => { setSelected(p); setWeight(""); setPieces(1); clearDiscount(); }}
            >
              <span className="pcard-name">{p.name}</span>
              <span className="pcard-price">฿{fmt(p.pricePerKg)}<small>/กก.</small></span>
              <span className={"pcard-stock" + (p.stock <= LOW_STOCK ? " warn" : "")}>
                เหลือ {p.stock} ลูก
              </span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ขั้นที่ 2: ชั่ง + จ่ายเงิน
  return (
    <div className="entry">
      <button className="back-row" onClick={reset}>
        <Icon name="arrow-left" size={22} /> เปลี่ยนพันธุ์
      </button>

      <div className="entry-head">
        <span className="entry-name">{selected.name}</span>
        <span className="entry-price">฿{fmt(selected.pricePerKg)}/กก.</span>
      </div>

      <div className="weight-display">
        <span className="weight-num">{weight === "" ? "0" : weight}</span>
        <span className="weight-unit">กก.</span>
      </div>

      <div className="keypad">
        {["1","2","3","4","5","6","7","8","9",".","0","del"].map((k) => (
          <button key={k} className={"key" + (k === "del" ? " key-del" : "")} onClick={() => tapKey(k)}>
            {k === "del" ? "⌫" : k}
          </button>
        ))}
      </div>

      <div className="pieces-row">
        <span className="pieces-label">จำนวนลูก</span>
        <div className="stepper">
          <button className="step-btn" onClick={() => setPieces((n) => Math.max(1, n - 1))}><Icon name="minus" size={26} /></button>
          <span className="step-val">{pieces}</span>
          <button className="step-btn" onClick={() => setPieces((n) => n + 1)}><Icon name="plus" size={26} /></button>
        </div>
      </div>

      <div className="disc-section">
        <div className="disc-head">ส่วนลด (ถ้ามี)</div>
        <div className="disc-mode">
          <button
            className={"disc-mode-btn" + (discMode === "percent" ? " active" : "")}
            onClick={() => { setDiscMode("percent"); setDiscBaht(""); }}
          >เปอร์เซ็นต์ %</button>
          <button
            className={"disc-mode-btn" + (discMode === "baht" ? " active" : "")}
            onClick={() => { setDiscMode("baht"); setDiscPct(0); }}
          >จำนวนเงิน ฿</button>
        </div>

        {discMode === "percent" ? (
          <div className="disc-presets">
            {[0, 5, 10, 15, 20].map((p) => (
              <button
                key={p}
                className={"disc-preset" + (discPct === p ? " sel" : "")}
                onClick={() => setDiscPct(p)}
              >{p === 0 ? "ไม่ลด" : p + "%"}</button>
            ))}
          </div>
        ) : (
          <input
            className="disc-input"
            type="number"
            inputMode="numeric"
            value={discBaht}
            onChange={(e) => setDiscBaht(e.target.value)}

          />
        )}
      </div>

      <div className="total-box">
        {discountAmount > 0 && (
          <span className="total-breakdown">ราคา ฿{fmt(subtotal)} − ส่วนลด ฿{fmt(discountAmount)}</span>
        )}
        <span className="total-label">{discountAmount > 0 ? "ยอดสุทธิ" : "รวมเป็นเงิน"}</span>
        <span className="total-num">฿{fmt(total)}</span>
      </div>

      <div className="pay-row">
        <button className="pay-btn cash" disabled={kgNum <= 0} onClick={() => doSell("cash")}>
          <Icon name="banknote" size={32} />
          <span>เงินสด</span>
        </button>
        <button className="pay-btn transfer" disabled={kgNum <= 0} onClick={() => doSell("transfer")}>
          <Icon name="smartphone" size={32} />
          <span>โอนเงิน</span>
        </button>
      </div>

      {success && (
        <div className="success-overlay">
          <div className="success-card">
            <div className="success-check"><Icon name="check" size={56} strokeWidth={3} /></div>
            <div className="success-title">บันทึกการขายแล้ว</div>
            <div className="success-amount">฿{fmt(success.amount)}</div>
            <div className={"success-pay " + success.payment}>
              {success.payment === "cash" ? "เงินสด" : "โอนเงิน"}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ===================== แดชบอร์ด ===================== */
function Dashboard({ sales, products, onDelete, onEdit }) {
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const today = sales.filter((s) => sameDay(s.ts));
  const todayTotal = today.reduce((a, s) => a + s.amount, 0);
  const cash = today.filter((s) => s.payment === "cash").reduce((a, s) => a + s.amount, 0);
  const transfer = today.filter((s) => s.payment === "transfer").reduce((a, s) => a + s.amount, 0);

  const days = useMemo(() => {
    const arr = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const sum = sales.filter((s) => sameDay(s.ts, d)).reduce((a, s) => a + s.amount, 0);
      arr.push({ label: d.toLocaleDateString("th-TH", { weekday: "short" }), date: d, sum });
    }
    return arr;
  }, [sales]);
  const maxDay = Math.max(1, ...days.map((d) => d.sum));

  // ----- ปฏิทินยอดขาย -----
  const [calCursor, setCalCursor] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [calSelected, setCalSelected] = useState(() => new Date());
  const WD = ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"];
  const calCells = useMemo(() => {
    const y = calCursor.getFullYear(), m = calCursor.getMonth();
    const startWd = new Date(y, m, 1).getDay();
    const dim = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startWd; i++) cells.push(null);
    for (let d = 1; d <= dim; d++) {
      const date = new Date(y, m, d);
      const sum = sales.filter((s) => sameDay(s.ts, date)).reduce((a, s) => a + s.amount, 0);
      cells.push({ d, date, sum });
    }
    return cells;
  }, [calCursor, sales]);
  const daySales = sales.filter((s) => sameDay(s.ts, calSelected)).sort((a, b) => new Date(b.ts) - new Date(a.ts));
  const dayTotal = daySales.reduce((a, s) => a + s.amount, 0);
  const dayCash = daySales.filter((s) => s.payment === "cash").reduce((a, s) => a + s.amount, 0);
  const dayTransfer = daySales.filter((s) => s.payment === "transfer").reduce((a, s) => a + s.amount, 0);
  const gotoMonth = (delta) => setCalCursor((c) => new Date(c.getFullYear(), c.getMonth() + delta, 1));
  const gotoToday = () => { const d = new Date(); setCalCursor(new Date(d.getFullYear(), d.getMonth(), 1)); setCalSelected(d); };

  return (
    <div>
      <h2 className="screen-title">สรุปยอดวันนี้</h2>

      <div className="big-total">
        <span className="big-total-label">ยอดขายวันนี้</span>
        <span className="big-total-num">฿{fmt(todayTotal)}</span>
        <span className="big-total-count">{today.length} รายการ</span>
      </div>

      <div className="stat-row">
        <div className="stat-card cash">
          <Icon name="banknote" size={24} />
          <span className="stat-label">เงินสด</span>
          <span className="stat-val">฿{fmt(cash)}</span>
        </div>
        <div className="stat-card transfer">
          <Icon name="smartphone" size={24} />
          <span className="stat-label">โอนเงิน</span>
          <span className="stat-val">฿{fmt(transfer)}</span>
        </div>
      </div>

      <h3 className="sub-title">ยอดขาย 7 วันล่าสุด</h3>
      <div className="chart">
        {days.map((d, i) => (
          <div key={i} className="bar-col">
            <span className="bar-amt">{d.sum > 0 ? fmt(d.sum) : ""}</span>
            <div className="bar-track">
              <div
                className={"bar-fill" + (sameDay(d.date.toISOString()) ? " is-today" : "")}
                style={{ height: Math.max(4, (d.sum / maxDay) * 100) + "%" }}
              />
            </div>
            <span className="bar-label">{d.label}</span>
          </div>
        ))}
      </div>

      <h3 className="sub-title">📅 ปฏิทินยอดขาย</h3>
      <div className="cal">
        <div className="cal-head">
          <button className="cal-nav" onClick={() => gotoMonth(-1)} aria-label="เดือนก่อนหน้า">◀</button>
          <div className="cal-title">{calCursor.toLocaleDateString("th-TH", { month: "long", year: "numeric" })}</div>
          <button className="cal-nav" onClick={() => gotoMonth(1)} aria-label="เดือนถัดไป">▶</button>
        </div>
        <button className="cal-today-btn" onClick={gotoToday}>กลับมาวันนี้</button>
        <div className="cal-grid cal-wdrow">
          {WD.map((w) => (<div key={w} className="cal-wd">{w}</div>))}
        </div>
        <div className="cal-grid">
          {calCells.map((c, i) => c === null ? (
            <div key={"e" + i} className="cal-cell empty" />
          ) : (
            <button
              key={c.d}
              className={"cal-cell" + (sameDay(c.date.toISOString(), calSelected) ? " selected" : "") + (sameDay(c.date.toISOString()) ? " today" : "") + (c.sum > 0 ? " has" : "")}
              onClick={() => setCalSelected(c.date)}
            >
              <span className="cal-num">{c.d}</span>
              {c.sum > 0 && <span className="cal-amt">฿{fmt(c.sum)}</span>}
            </button>
          ))}
        </div>
      </div>

      <div className="cal-detail">
        <div className="cal-detail-date">{calSelected.toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
        <div className="cal-detail-total">฿{fmt(dayTotal)}</div>
        <div className="cal-detail-sub">{daySales.length} รายการ · เงินสด ฿{fmt(dayCash)} · โอน ฿{fmt(dayTransfer)}</div>
        {daySales.length === 0 ? (
          <p className="muted">ไม่มีรายการขายในวันที่เลือก</p>
        ) : (
          <div className="sale-list" style={{ marginTop: "10px" }}>
            {daySales.map((s) => (
              <div key={s.id} className="sale-item">
                <div className="sale-main">
                  <span className="sale-name">{s.productName} · {s.kg} กก.{s.discount > 0 ? " (ลด ฿" + fmt(s.discount) + ")" : ""}</span>
                  <span className="sale-time">{new Date(s.ts).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" })}</span>
                </div>
                <div className="sale-right">
                  <span className={"badge " + s.payment}>{s.payment === "cash" ? "เงินสด" : "โอน"}</span>
                  <span className="sale-amt">฿{fmt(s.amount)}</span>
                  <button className="edit-btn" onClick={() => setEditing(s)} aria-label="แก้ไขรายการ"><Icon name="pencil" size={18} /></button>
                  <button className="del-btn" onClick={() => setConfirmDel(s)} aria-label="ลบรายการ"><Icon name="trash" size={18} /></button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <h3 className="sub-title">สต็อกคงเหลือ (ล็อตปัจจุบัน)</h3>
      <div className="stock-overview">
        {products.map((p) => (
          <div key={p.id} className="stock-line">
            <div className="stock-line-head">
              <span>{p.name}</span>
              <span className={p.stock <= LOW_STOCK ? "warn" : ""}>
                {p.stock} / {p.initialStock} ลูก
              </span>
            </div>
            <div className="stock-track">
              <div
                className={"stock-fill" + (p.stock <= LOW_STOCK ? " warn" : "")}
                style={{ width: Math.min(100, (p.stock / Math.max(1, p.initialStock)) * 100) + "%" }}
              />
            </div>
          </div>
        ))}
      </div>

      <h3 className="sub-title">รายการล่าสุด</h3>
      {today.length === 0 ? (
        <p className="muted">ยังไม่มีการขายวันนี้ — เริ่มขายได้ที่หน้า “ขาย”</p>
      ) : (
        <div className="sale-list">
          {today.slice(0, 12).map((s) => (
            <div key={s.id} className="sale-item">
              <div className="sale-main">
                <span className="sale-name">{s.productName} · {s.kg} กก.</span>
                <span className="sale-time">
                  {new Date(s.ts).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" })}
                </span>
              </div>
              <div className="sale-right">
                <span className={"badge " + s.payment}>{s.payment === "cash" ? "เงินสด" : "โอน"}</span>
                <span className="sale-amt">฿{fmt(s.amount)}</span>
                <button className="edit-btn" onClick={() => setEditing(s)} aria-label="แก้ไขรายการ">
                  <Icon name="pencil" size={18} />
                </button>
                <button className="del-btn" onClick={() => setConfirmDel(s)} aria-label="ลบรายการ">
                  <Icon name="trash" size={18} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {editing && (
        <EditSaleModal
          sale={editing}
          product={products.find((p) => p.id === editing.productId)}
          onClose={() => setEditing(null)}
          onSave={(kg, pieces) => { onEdit(editing.id, kg, pieces); setEditing(null); }}
        />
      )}

      {confirmDel && (
        <div className="modal-backdrop" onClick={() => setConfirmDel(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head">
              <span>ลบรายการนี้?</span>
              <button className="icon-btn" onClick={() => setConfirmDel(null)}><Icon name="x" size={20} /></button>
            </div>
            <p className="confirm-sub">
              {confirmDel.productName} · {confirmDel.kg} กก. · ฿{fmt(confirmDel.amount)}<br />
              สต็อกจะถูกคืนให้ {confirmDel.pieces} ลูก
            </p>
            <div className="confirm-row">
              <button className="btn btn-ghost full" onClick={() => setConfirmDel(null)}>ยกเลิก</button>
              <button className="btn btn-danger full" onClick={() => { onDelete(confirmDel.id); setConfirmDel(null); }}>ลบรายการ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function EditSaleModal({ sale, product, onClose, onSave }) {
  const [kg, setKg] = useState(String(sale.kg));
  const [pieces, setPieces] = useState(sale.pieces || 1);
  const unit = product ? product.pricePerKg : (sale.kg ? Math.round(sale.amount / sale.kg) : 0);
  const kgNum = parseFloat(kg) || 0;
  const total = Math.round(kgNum * unit);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <span>แก้ไขรายการ</span>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={20} /></button>
        </div>
        <p className="note">{sale.productName} · ฿{fmt(unit)}/กก.</p>

        <label className="field">
          <span>น้ำหนัก (กิโลกรัม)</span>
          <input type="number" inputMode="decimal" value={kg} onChange={(e) => setKg(e.target.value)} placeholder="0" />
        </label>

        <div className="field">
          <span>จำนวนลูก</span>
          <div className="stepper" style={{ justifyContent: "flex-start", gap: "16px", marginTop: "4px" }}>
            <button className="step-btn" onClick={() => setPieces((n) => Math.max(1, n - 1))}><Icon name="minus" size={24} /></button>
            <span className="step-val">{pieces}</span>
            <button className="step-btn" onClick={() => setPieces((n) => n + 1)}><Icon name="plus" size={24} /></button>
          </div>
        </div>

        <div className="edit-total">
          <div className="edit-total-label">ยอดใหม่</div>
          <div className="edit-total-num">฿{fmt(total)}</div>
        </div>

        <button className="btn btn-primary full" disabled={kgNum <= 0} onClick={() => onSave(kgNum, pieces)}>
          บันทึกการแก้ไข
        </button>
      </div>
    </div>
  );
}

/* ===================== หน้าสต็อก ===================== */
function StockScreen({ products, setProducts }) {
  const [editing, setEditing] = useState(null); // {mode, product}

  const adjust = (id, delta) => {
    setProducts((prev) =>
      prev.map((p) => {
        if (p.id !== id) return p;
        const stock = Math.max(0, p.stock + delta);
        return { ...p, stock, initialStock: Math.max(p.initialStock, stock) };
      })
    );
  };

  const save = (form) => {
    if (editing.mode === "add") {
      setProducts((prev) => [
        ...prev,
        {
          id: uid(),
          name: form.name.trim() || "ทุเรียน",
          pricePerKg: Math.max(0, Math.round(+form.pricePerKg || 0)),
          stock: Math.max(0, Math.round(+form.stock || 0)),
          initialStock: Math.max(0, Math.round(+form.stock || 0)),
        },
      ]);
    } else {
      setProducts((prev) =>
        prev.map((p) =>
          p.id === editing.product.id
            ? {
                ...p,
                name: form.name.trim() || p.name,
                pricePerKg: Math.max(0, Math.round(+form.pricePerKg || 0)),
                stock: Math.max(0, Math.round(+form.stock || 0)),
                initialStock: Math.max(Math.round(+form.stock || 0), Math.round(+form.stock || 0)),
              }
            : p
        )
      );
    }
    setEditing(null);
  };

  const remove = (id) => {
    if (confirm("ลบพันธุ์นี้?")) setProducts((prev) => prev.filter((p) => p.id !== id));
  };

  return (
    <div>
      <h2 className="screen-title">สต็อกทุเรียน</h2>
      <div className="stock-cards">
        {products.map((p) => (
          <div key={p.id} className={"stock-card" + (p.stock <= LOW_STOCK ? " low" : "")}>
            <div className="stock-card-top">
              <div>
                <div className="stock-card-name">{p.name}</div>
                <div className="stock-card-price">฿{fmt(p.pricePerKg)}/กก.</div>
              </div>
              <button className="icon-btn" onClick={() => setEditing({ mode: "edit", product: p })}>
                <Icon name="pencil" size={18} />
              </button>
            </div>

            {p.stock <= LOW_STOCK && (
              <div className="low-flag"><Icon name="alert-triangle" size={16} /> ใกล้หมด</div>
            )}

            <div className="stock-control">
              <button className="step-btn lg" onClick={() => adjust(p.id, -1)}><Icon name="minus" size={24} /></button>
              <div className="stock-count">
                <span className="stock-count-num">{p.stock}</span>
                <span className="stock-count-unit">ลูก</span>
              </div>
              <button className="step-btn lg" onClick={() => adjust(p.id, 1)}><Icon name="plus" size={24} /></button>
            </div>

            <button className="btn btn-ghost full" onClick={() => setEditing({ mode: "edit", product: p })}>
              <Icon name="package-plus" size={18} /> ตั้งสต็อกล็อตใหม่
            </button>
            <button className="link-danger" onClick={() => remove(p.id)}>
              <Icon name="trash" size={15} /> ลบพันธุ์นี้
            </button>
          </div>
        ))}
      </div>

      <button className="btn btn-primary full big-add" onClick={() => setEditing({ mode: "add", product: { name: "", pricePerKg: "", stock: "" } })}>
        <Icon name="plus" size={22} /> เพิ่มพันธุ์ทุเรียน
      </button>

      {editing && (
        <ProductModal
          mode={editing.mode}
          product={editing.product}
          onClose={() => setEditing(null)}
          onSave={save}
        />
      )}
    </div>
  );
}

/* ===================== ตั้งค่า ===================== */
function SettingsScreen({ settings, setSettings, sales, products, account, onLogout, onChangePin }) {
  const [name, setName] = useState(settings.shopName);
  const [token, setToken] = useState(settings.lineToken);
  const [backup, setBackup] = useState(null);
  const [showPin, setShowPin] = useState(false);
  const taRef = useRef(null);

  useEffect(() => { setName(settings.shopName); setToken(settings.lineToken); }, [settings]);

  const saveShop = () => setSettings((s) => ({ ...s, shopName: name.trim() || s.shopName }));

  const today = sales.filter((s) => sameDay(s.ts));
  const summaryText = () => {
    const total = today.reduce((a, s) => a + s.amount, 0);
    const cash = today.filter((s) => s.payment === "cash").reduce((a, s) => a + s.amount, 0);
    const transfer = today.filter((s) => s.payment === "transfer").reduce((a, s) => a + s.amount, 0);
    const byType = {};
    today.forEach((s) => { byType[s.productName] = (byType[s.productName] || 0) + s.amount; });
    const lines = Object.entries(byType).map(([k, v]) => `• ${k}: ฿${fmt(v)}`).join("\n");
    return (
      `📊 สรุปยอดขาย ${settings.shopName}\n` +
      `วันที่ ${new Date().toLocaleDateString("th-TH")}\n\n` +
      `ยอดรวม: ฿${fmt(total)} (${today.length} รายการ)\n` +
      `เงินสด: ฿${fmt(cash)}\n` +
      `โอนเงิน: ฿${fmt(transfer)}\n` +
      (lines ? `\nแยกตามพันธุ์:\n${lines}` : "")
    );
  };

  const copySummary = async () => {
    const text = summaryText();
    try {
      await navigator.clipboard.writeText(text);
      alert("คัดลอกสรุปยอดแล้ว — วางลงแชต LINE ได้เลย");
    } catch {
      setBackup({ title: "สรุปยอดวันนี้ (กดค้างเพื่อคัดลอก)", text });
    }
  };

  const showBackup = () => {
    const data = JSON.stringify({ products, sales, settings, exportedAt: new Date().toISOString() }, null, 2);
    setBackup({ title: "ข้อมูลสำรอง (คัดลอกเก็บไว้)", text: data });
  };

  const resetAll = () => {
    if (confirm("ล้างข้อมูลทั้งหมดและเริ่มใหม่? ลบไม่สามารถกู้คืนได้")) {
      dbSet(KEY_SALES, []);
      dbSet(KEY_PRODUCTS, DEFAULT_PRODUCTS);
      location.reload();
    }
  };

  return (
    <div>
      <h2 className="screen-title">ตั้งค่า</h2>

      <div className="card">
        <h3 className="card-title">ข้อมูลร้าน</h3>
        <label className="field">
          <span>ชื่อร้าน</span>
          <input value={name} onChange={(e) => setName(e.target.value)} onBlur={saveShop} />
        </label>
      </div>

      <div className="card">
        <h3 className="card-title"><Icon name="shield-check" size={20} /> บัญชีและความปลอดภัย</h3>
        <p className="note">เข้าใช้งานด้วยชื่อผู้ใช้และรหัสผ่านของร้าน ระบบจะจำการเข้าสู่ระบบในเครื่องนี้ไว้จนกว่าจะกดออกจากระบบ</p>
        <div className="account-row">
          <button className="btn btn-ghost full" onClick={() => setShowPin(true)}><Icon name="key" size={18} /> เปลี่ยนรหัสผ่าน</button>
          <button className="btn btn-ghost full" onClick={() => { if (confirm("ออกจากระบบ?")) onLogout && onLogout(); }}><Icon name="log-out" size={18} /> ออกจากระบบ</button>
        </div>
      </div>

      <div className="card">
        <h3 className="card-title">สรุปยอด & สำรองข้อมูล</h3>
        <p className="note">ข้อมูลถูกบันทึกอัตโนมัติในเครื่องนี้ เปิดใหม่ก็ยังอยู่ แนะนำให้คัดลอกข้อมูลสำรองเก็บไว้เป็นระยะ</p>
        <button className="btn btn-ghost full" onClick={copySummary}><Icon name="copy" size={18} /> คัดลอกสรุปยอดวันนี้</button>
        <button className="btn btn-ghost full" onClick={showBackup}><Icon name="download" size={18} /> ดู / คัดลอกข้อมูลสำรอง</button>
      </div>

      <div className="card line-card">
        <h3 className="card-title"><span className="line-dot" /> เชื่อมต่อ LINE</h3>
        <p className="note">
          เตรียมไว้สำหรับอนาคต — เมื่อมีระบบหลังบ้าน จะส่งสรุปยอดและแจ้งเตือนสต็อกใกล้หมดเข้า LINE ได้อัตโนมัติ
          ตอนนี้ใช้ปุ่ม “คัดลอกสรุปยอดวันนี้” แล้ววางในแชต LINE ได้ทันที
        </p>
        <label className="field">
          <span>LINE Token (สำหรับเชื่อมต่อในอนาคต)</span>
          <input value={token} onChange={(e) => setToken(e.target.value)} onBlur={() => setSettings((s) => ({ ...s, lineToken: token }))} placeholder="ยังไม่ต้องกรอกก็ได้" />
        </label>
        <label className="toggle-row">
          <span>เปิดการแจ้งเตือนเข้า LINE</span>
          <button
            className={"toggle" + (settings.lineEnabled ? " on" : "")}
            onClick={() => setSettings((s) => ({ ...s, lineEnabled: !s.lineEnabled }))}
          >
            <span className="toggle-knob" />
          </button>
        </label>
        <p className="note small">สถานะ: {settings.lineEnabled ? "พร้อมเชื่อมต่อ (รอระบบหลังบ้าน)" : "ปิดอยู่"}</p>
      </div>

      <button className="link-danger center" onClick={resetAll}><Icon name="rotate-ccw" size={15} /> ล้างข้อมูลทั้งหมด</button>

      {backup && (
        <div className="modal-backdrop" onClick={() => setBackup(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head">
              <span>{backup.title}</span>
              <button className="icon-btn" onClick={() => setBackup(null)}><Icon name="x" size={20} /></button>
            </div>
            <textarea ref={taRef} className="backup-area" readOnly value={backup.text} onFocus={(e) => e.target.select()} />
            <button className="btn btn-primary full" onClick={() => { taRef.current?.select(); try { document.execCommand("copy"); alert("คัดลอกแล้ว"); } catch {} }}>
              คัดลอก
            </button>
          </div>
        </div>
      )}

      {showPin && <ChangePinModal onClose={() => setShowPin(false)} onSave={onChangePin} />}
    </div>
  );
}

/* ===================== สไตล์ ===================== */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap');

:root{
  --rind:#2f5d3a; --rind-deep:#1d3f27; --flesh:#f2b134; --flesh-soft:#fbe3a8;
  --cream:#fbf7ec; --card:#ffffff; --ink:#26211a; --muted:#7c7567;
  --cash:#2f8f4e; --transfer:#2b6fb0; --line:#e7e0d2; --danger:#c0392b;
  --shadow:0 2px 10px rgba(45,40,25,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.app{
  font-family:'IBM Plex Sans Thai',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at 20% -5%, #eef3e6 0%, transparent 45%),
    radial-gradient(circle at 100% 0%, #fcefcf 0%, transparent 40%),
    var(--cream);
  color:var(--ink); min-height:100vh; font-size:18px; line-height:1.4;
}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:96px}
.loading{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:22px;color:var(--rind);font-weight:600}
.boot-logo{width:74px;height:74px;border-radius:16px;object-fit:cover}
.logo-mark{width:38px;height:38px;border-radius:9px;object-fit:cover;background:#fff;flex-shrink:0}

/* header */
.header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:var(--rind);color:#fff;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.logo{font-size:26px}
.brand-name{font-weight:700;font-size:19px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-pill{display:flex;flex-direction:column;align-items:flex-end;background:rgba(255,255,255,.14);
  padding:6px 14px;border-radius:14px;cursor:pointer;flex-shrink:0}
.today-pill-label{font-size:12px;opacity:.85}
.today-pill-val{font-weight:700;font-size:18px;color:var(--flesh-soft)}

.screen{padding:18px 16px 8px}
.screen-title{font-size:22px;font-weight:700;margin:4px 0 16px;color:var(--rind-deep)}
.sub-title{font-size:17px;font-weight:600;margin:24px 0 10px;color:var(--rind-deep)}
.muted{color:var(--muted);text-align:center;padding:18px 0}

/* product grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.pcard{position:relative;background:var(--card);border:2px solid var(--line);border-radius:20px;
  padding:18px 14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;text-align:left;
  box-shadow:var(--shadow);transition:transform .08s,border-color .15s;min-height:130px;overflow:hidden}
.pcard::before{content:"";position:absolute;inset:0 0 auto 0;height:8px;
  background:repeating-linear-gradient(135deg,var(--rind) 0 7px,#3c7349 7px 14px)}
.pcard:active{transform:scale(.97);border-color:var(--rind)}
.pcard.low{border-color:#e7b34a;background:#fffaf0}
.pcard-name{font-size:21px;font-weight:700;margin-top:6px;color:var(--rind-deep)}
.pcard-price{font-size:24px;font-weight:700;color:var(--flesh)}
.pcard-price small{font-size:13px;color:var(--muted);font-weight:500}
.pcard-stock{font-size:14px;color:var(--muted);margin-top:auto}
.pcard-stock.warn{color:#b8791a;font-weight:600}

/* entry / keypad */
.back-row{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--rind);
  font-size:17px;font-weight:600;padding:4px 0;margin-bottom:8px;cursor:pointer}
.entry-head{display:flex;align-items:baseline;justify-content:space-between;
  background:var(--rind);color:#fff;border-radius:16px;padding:14px 18px}
.entry-name{font-size:24px;font-weight:700}
.entry-price{font-size:16px;color:var(--flesh-soft)}
.weight-display{display:flex;align-items:baseline;justify-content:center;gap:8px;margin:18px 0 12px}
.weight-num{font-size:52px;font-weight:700;color:var(--ink);line-height:1}
.weight-unit{font-size:22px;color:var(--muted);font-weight:600}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{font-size:28px;font-weight:600;background:var(--card);border:2px solid var(--line);border-radius:16px;
  padding:16px 0;cursor:pointer;box-shadow:var(--shadow);transition:transform .06s}
.key:active{transform:scale(.95);background:var(--flesh-soft)}
.key-del{color:var(--danger);font-size:24px}

.pieces-row{display:flex;align-items:center;justify-content:space-between;margin:16px 2px}
.pieces-label{font-size:18px;font-weight:600}
.stepper{display:flex;align-items:center;gap:14px}
.step-btn{width:54px;height:54px;border-radius:14px;border:2px solid var(--rind);background:#fff;color:var(--rind);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.step-btn:active{background:var(--flesh-soft)}
.step-btn.lg{width:58px;height:58px}
.step-val{font-size:30px;font-weight:700;min-width:42px;text-align:center}

.total-box{display:flex;flex-direction:column;align-items:center;gap:2px;
  background:linear-gradient(135deg,#fff7e4,#fdeccb);border:2px solid var(--flesh);
  border-radius:18px;padding:14px;margin:6px 0 14px}
.total-label{font-size:15px;color:#9a7a2a;font-weight:600}
.total-num{font-size:46px;font-weight:700;color:#b9851b;line-height:1.1}

.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pay-btn{display:flex;flex-direction:column;align-items:center;gap:6px;border:none;border-radius:18px;
  padding:20px 0;font-size:21px;font-weight:700;color:#fff;cursor:pointer;box-shadow:var(--shadow);transition:transform .07s}
.pay-btn:active{transform:scale(.97)}
.pay-btn:disabled{opacity:.45;cursor:not-allowed}
.pay-btn.cash{background:var(--cash)}
.pay-btn.transfer{background:var(--transfer)}

/* success */
.success-overlay{position:fixed;inset:0;background:rgba(29,63,39,.55);display:flex;align-items:center;justify-content:center;z-index:60;animation:fade .2s}
.success-card{background:#fff;border-radius:24px;padding:34px 40px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,.25);animation:pop .25s}
.success-check{width:90px;height:90px;border-radius:50%;background:var(--cash);color:#fff;display:flex;align-items:center;justify-content:center}
.success-title{font-size:20px;font-weight:700;color:var(--rind-deep)}
.success-amount{font-size:42px;font-weight:700;color:var(--flesh)}
.success-pay{font-size:15px;font-weight:600;padding:4px 14px;border-radius:20px}
.success-pay.cash{background:#e3f5e9;color:var(--cash)}
.success-pay.transfer{background:#e4eefb;color:var(--transfer)}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* dashboard */
.big-total{background:var(--rind);color:#fff;border-radius:22px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow)}
.big-total-label{font-size:15px;opacity:.85}
.big-total-num{font-size:48px;font-weight:700;color:var(--flesh-soft);line-height:1.1}
.big-total-count{font-size:14px;opacity:.8}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.stat-card{background:var(--card);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow);border-left:5px solid}
.stat-card.cash{border-color:var(--cash);color:var(--cash)}
.stat-card.transfer{border-color:var(--transfer);color:var(--transfer)}
.stat-label{font-size:14px;color:var(--muted)}
.stat-val{font-size:26px;font-weight:700;color:var(--ink)}

.chart{display:flex;align-items:flex-end;gap:8px;height:170px;background:var(--card);border-radius:16px;padding:14px 10px 8px;box-shadow:var(--shadow)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:4px}
.bar-amt{font-size:11px;color:var(--muted);height:14px}
.bar-track{width:70%;flex:1;display:flex;align-items:flex-end}
.bar-fill{width:100%;background:var(--flesh-soft);border-radius:6px 6px 0 0;min-height:4px}
.bar-fill.is-today{background:var(--flesh)}
.bar-label{font-size:13px;color:var(--muted)}

.stock-overview{display:flex;flex-direction:column;gap:12px;background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.stock-line-head{display:flex;justify-content:space-between;font-size:16px;font-weight:600;margin-bottom:6px}
.stock-line-head .warn{color:#b8791a}
.stock-track{height:12px;background:#eee6d6;border-radius:8px;overflow:hidden}
.stock-fill{height:100%;background:var(--rind);border-radius:8px}
.stock-fill.warn{background:#e7a93a}

.sale-list{display:flex;flex-direction:column;gap:8px}
.sale-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
.sale-main{display:flex;flex-direction:column}
.sale-name{font-size:16px;font-weight:600}
.sale-time{font-size:13px;color:var(--muted)}
.sale-right{display:flex;align-items:center;gap:10px}
.badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:12px}
.badge.cash{background:#e3f5e9;color:var(--cash)}
.badge.transfer{background:#e4eefb;color:var(--transfer)}
.sale-amt{font-size:18px;font-weight:700}
.del-btn{background:none;border:none;color:#c2a;color:var(--muted);cursor:pointer;padding:4px}
.del-btn:active{color:var(--danger)}

/* stock screen */
.stock-cards{display:flex;flex-direction:column;gap:14px}
.stock-card{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow);border:2px solid transparent;display:flex;flex-direction:column;gap:12px}
.stock-card.low{border-color:#e7b34a;background:#fffaf0}
.stock-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.stock-card-name{font-size:22px;font-weight:700;color:var(--rind-deep)}
.stock-card-price{font-size:16px;color:var(--flesh);font-weight:600}
.low-flag{display:inline-flex;align-items:center;gap:5px;font-size:14px;color:#b8791a;font-weight:600}
.stock-control{display:flex;align-items:center;justify-content:center;gap:22px}
.stock-count{display:flex;flex-direction:column;align-items:center;min-width:80px}
.stock-count-num{font-size:44px;font-weight:700;line-height:1}
.stock-count-unit{font-size:14px;color:var(--muted)}
.icon-btn{background:#f3efe4;border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--rind);cursor:pointer}
.link-danger{background:none;border:none;color:var(--danger);font-size:14px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;align-self:center;padding:4px}
.link-danger.center{display:flex;margin:24px auto 8px}
.big-add{margin-top:16px}

/* buttons / fields */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:18px;font-weight:600;border-radius:14px;padding:14px 20px;cursor:pointer;border:none;font-family:inherit}
.btn.full{width:100%}
.btn-primary{background:var(--rind);color:#fff;box-shadow:var(--shadow)}
.btn-primary:active{background:var(--rind-deep)}
.btn-ghost{background:#fff;color:var(--rind);border:2px solid var(--line)}
.btn-ghost:active{background:var(--flesh-soft)}
.card{background:var(--card);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:18px;font-weight:700;margin:0 0 12px;color:var(--rind-deep);display:flex;align-items:center;gap:8px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field span{font-size:15px;font-weight:600;color:var(--ink)}
.field input{font-family:inherit;font-size:19px;padding:13px 14px;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--rind)}
.note{font-size:14px;color:var(--muted);line-height:1.5;margin:0 0 12px}
.note.small{margin:8px 0 0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:16px;font-weight:600;margin-top:6px}
.toggle{width:58px;height:32px;border-radius:20px;background:#d7d0c1;border:none;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--cash)}
.toggle-knob{position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-knob{left:29px}
.line-card .line-dot{width:14px;height:14px;border-radius:4px;background:#06c755;display:inline-block}
.backup-area{width:100%;height:200px;font-family:monospace;font-size:13px;border:2px solid var(--line);border-radius:12px;padding:12px;resize:none;margin-bottom:12px}

/* empty */
.empty{text-align:center;padding:50px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-title{font-size:20px;font-weight:700;color:var(--rind-deep)}
.empty-sub{color:var(--muted);margin-bottom:12px}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(29,63,39,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .15s}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 30px;width:100%;max-width:520px;animation:slideup .22s;max-height:92vh;overflow:auto}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;font-size:20px;font-weight:700;margin-bottom:16px;color:var(--rind-deep)}

/* bottom nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);
  display:flex;max-width:520px;margin:0 auto;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(45,40,25,.06)}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 0;color:var(--muted);cursor:pointer;font-family:inherit}
.nav-btn.active{color:var(--rind)}
.nav-icon{display:flex}
.nav-icon svg{width:26px;height:26px}
.nav-label{font-size:13px;font-weight:600}

/* discount */
.disc-section{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px;margin:6px 0 12px;box-shadow:var(--shadow)}
.disc-head{font-size:16px;font-weight:600;color:var(--rind-deep);margin-bottom:10px}
.disc-mode{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.disc-mode-btn{font-family:inherit;font-size:16px;font-weight:600;padding:10px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
.disc-mode-btn.active{border-color:var(--rind);background:var(--rind);color:#fff}
.disc-presets{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.disc-preset{font-family:inherit;font-size:16px;font-weight:700;padding:12px 0;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
.disc-preset.sel{border-color:var(--flesh);background:var(--flesh-soft);color:#9a6b12}
.disc-input{width:100%;font-family:inherit;font-size:20px;padding:13px 14px;border:2px solid var(--line);border-radius:12px;text-align:center;color:var(--ink)}
.disc-input:focus{outline:none;border-color:var(--rind)}
.total-breakdown{font-size:14px;color:#9a7a2a;font-weight:600;margin-bottom:2px}

/* calendar */
.cal{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cal-nav{width:46px;height:46px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--rind);font-size:18px;font-weight:700;cursor:pointer}
.cal-nav:active{background:var(--flesh-soft)}
.cal-title{font-size:19px;font-weight:700;color:var(--rind-deep)}
.cal-today-btn{display:block;margin:0 auto 12px;background:none;border:none;color:var(--rind);font-size:14px;font-weight:600;text-decoration:underline;cursor:pointer;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-wdrow{margin-bottom:4px}
.cal-wd{text-align:center;font-size:13px;font-weight:600;color:var(--muted);padding:4px 0}
.cal-cell{aspect-ratio:1/1;border:2px solid transparent;border-radius:10px;background:#f6f2e8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;padding:2px;font-family:inherit;min-height:44px}
.cal-cell.empty{background:none;border:none;cursor:default}
.cal-cell.has{background:#eef5ea}
.cal-cell.today{border-color:var(--flesh)}
.cal-cell.selected{background:var(--rind);border-color:var(--rind)}
.cal-num{font-size:16px;font-weight:600;color:var(--ink)}
.cal-amt{font-size:9px;font-weight:700;color:var(--rind);line-height:1}
.cal-cell.selected .cal-num,.cal-cell.selected .cal-amt{color:#fff}
.cal-detail{background:var(--rind);color:#fff;border-radius:16px;padding:16px;margin-top:12px}
.cal-detail-date{font-size:15px;color:var(--flesh-soft);font-weight:600}
.cal-detail-total{font-size:36px;font-weight:700;color:#fff;line-height:1.2}
.cal-detail-sub{font-size:14px;opacity:.9}
.cal-detail .muted{color:rgba(255,255,255,.8)}
.cal-detail .sale-item{background:#fff;color:var(--ink)}

/* edit / delete in dashboard */
.edit-btn{background:none;border:none;color:var(--rind);cursor:pointer;padding:4px;display:flex}
.edit-btn:active{color:var(--rind-deep)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{filter:brightness(.92)}
.confirm-sub{font-size:16px;color:var(--ink);line-height:1.6;text-align:center;margin:0 0 18px}
.confirm-row{display:flex;gap:12px}
.edit-total{background:linear-gradient(135deg,#fff7e4,#fdeccb);border:2px solid var(--flesh);border-radius:14px;padding:12px;text-align:center;margin:6px 0 16px}
.edit-total-label{font-size:14px;color:#9a7a2a;font-weight:600}
.edit-total-num{font-size:34px;font-weight:700;color:#b9851b;line-height:1.2}

/* auth / pin */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px;margin:18px 0 4px}
.auth-tab{font-family:inherit;font-size:16px;font-weight:600;padding:11px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
.auth-tab.active{border-color:var(--rind);background:var(--rind);color:#fff}
.auth-form{width:100%;max-width:340px;margin-top:12px;text-align:left}
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center}
.auth-logo{width:200px;height:auto;border-radius:20px;margin-bottom:8px;box-shadow:var(--shadow);background:#fff}
.cloud-status{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-top:6px}
.cloud-dot{width:9px;height:9px;border-radius:50%;background:#bbb}
.cloud-dot.on{background:#39b54a;box-shadow:0 0 0 3px rgba(57,181,74,.18)}
.auth-shop{font-size:25px;font-weight:700;color:var(--rind-deep)}
.auth-title{font-size:19px;font-weight:600;color:var(--ink);margin-top:18px}
.auth-sub{font-size:15px;color:var(--muted);margin-top:10px;max-width:300px;line-height:1.5}
.pin-center{display:flex;flex-direction:column;align-items:center}
.pin-dots{display:flex;gap:18px;margin:18px 0 2px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--rind);background:transparent;transition:background .12s,transform .12s}
.pin-dot.filled{background:var(--rind);transform:scale(1.05)}
.pin-dots.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.auth-error{color:var(--danger);font-size:15px;font-weight:600;min-height:22px;margin:6px 0 4px}
.pinpad{display:grid;grid-template-columns:repeat(3,74px);gap:16px;margin-top:6px;justify-content:center}
.pin-key{height:74px;width:74px;font-size:30px;font-weight:600;background:var(--card);border:2px solid var(--line);border-radius:50%;cursor:pointer;box-shadow:var(--shadow);transition:transform .06s,background .1s;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.pin-key:active{transform:scale(.92);background:var(--flesh-soft)}
.pin-key.blank{background:none;border:none;box-shadow:none;cursor:default}
.pin-key.del{font-size:26px;color:var(--danger)}
.auth-name{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;margin-top:18px}
.auth-name input{font-family:inherit;font-size:20px;padding:15px;border:2px solid var(--line);border-radius:14px;text-align:center;background:#fff;color:var(--ink)}
.auth-name input:focus{outline:none;border-color:var(--rind)}
.auth-remember{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:22px;font-size:15px;color:var(--ink)}
.auth-link{background:none;border:none;color:var(--rind);font-size:15px;text-decoration:underline;cursor:pointer;margin-top:14px;font-family:inherit}
.account-row{display:flex;flex-direction:column;gap:10px}

@media (max-width:360px){ .app{font-size:17px} .grid{gap:10px} }

/* จอใหญ่ (แท็บเล็ต/คอม) — เลย์เอาต์เว็บ ใช้พื้นที่จอ เมนูเป็นแถบข้าง */
@media (min-width:760px){
  .wrap{
    max-width:1120px;
    display:grid;
    grid-template-columns:240px 1fr;
    grid-template-areas:"nav header" "nav main";
    padding-bottom:0;
    min-height:100vh;
    background:var(--card);
    box-shadow:0 0 50px rgba(45,40,25,.07);
  }
  .header{grid-area:header}
  .screen{grid-area:main;padding:26px 30px 40px}
  .nav{
    grid-area:nav;position:sticky;top:0;align-self:start;height:100vh;
    flex-direction:column;align-items:stretch;
    max-width:none;margin:0;border-top:none;border-right:1px solid var(--line);
    padding:18px 12px;gap:6px;box-shadow:none;background:var(--cream)
  }
  .nav-btn{flex-direction:row;justify-content:flex-start;gap:14px;padding:14px 16px;border-radius:12px}
  .nav-btn.active{background:#fff;box-shadow:var(--shadow)}
  .nav-icon svg{width:24px;height:24px}
  .nav-label{font-size:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}
  .entry,.disc-section,.total-box,.pay-row,.weight-display,.keypad,.pieces-row,.back-row,.entry-head{max-width:600px}
  .entry{margin:0 auto}
}
@media (min-width:1000px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
}
@media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
